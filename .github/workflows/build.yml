name: Build Ascent

on:
  push:
    branches:
      - 'refactor/*'

jobs:
  build:
    name: xcodebuild (iOS Simulator)
    runs-on: macos-26

    env:
      SCHEME: Ascent
      PROJECT: Ascent.xcodeproj
      DERIVED_DATA: ${{ github.workspace }}/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: ${{ runner.os }}-deriveddata-${{ env.SCHEME }}-${{ hashFiles('**/*.swift', '**/project.pbxproj', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ env.SCHEME }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build
